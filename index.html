<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Anime Tier List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0b0c10;
      --card-bg: #1f2833;
      --text-main: #edf5e1;
      --text-muted: #c5c6c7;
      
      /* Tier Colors */
      --tier-s: #ff0055; /* Muy bueno - Rojo Neón */
      --tier-a: #ff7700; /* Bueno - Naranja Neón */
      --tier-b: #ffcc00; /* Ni tan bien ni tan mal - Amarillo */
      --tier-c: #6c757d; /* Aburrido - Gris */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 0, 85, 0.5), 0 0 20px rgba(0, 225, 255, 0.3);
      margin-bottom: 1.5rem;
    }

    /* Controles: Buscador y Filtro */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto 2.5rem auto;
    }

    .controls input, .controls select {
      background: #12151e;
      border: 1px solid #333;
      color: var(--text-main);
      padding: 0.75rem 1.2rem;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .controls input {
      flex: 1;
      min-width: 240px;
    }

    .controls input:focus, .controls select:focus {
      border-color: #00e1ff;
      box-shadow: 0 0 10px rgba(0, 225, 255, 0.4);
    }

    /* Estructura Tier List */
    .tier-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .tier-row {
      display: flex;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tier-label {
      width: 160px;
      min-width: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
      text-transform: uppercase;
      color: #000;
    }

    /* Colores Específicos */
    .tier-s .tier-label { background-color: var(--tier-s); box-shadow: 5px 0 15px rgba(255, 0, 85, 0.4); }
    .tier-a .tier-label { background-color: var(--tier-a); box-shadow: 5px 0 15px rgba(255, 119, 0, 0.4); }
    .tier-b .tier-label { background-color: var(--tier-b); box-shadow: 5px 0 15px rgba(255, 204, 0, 0.4); }
    .tier-c .tier-label { background-color: var(--tier-c); color: #fff; box-shadow: 5px 0 15px rgba(108, 117, 125, 0.4); }

    .tier-content {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem;
      flex: 1;
      align-items: flex-start;
      min-height: 180px;
    }

    /* Tarjetas de Anime */
    .anime-card {
      width: 110px;
      background: #12151e;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .anime-card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 8px 15px rgba(0, 225, 255, 0.3);
      z-index: 2;
    }

    .anime-img-wrapper {
      width: 100%;
      height: 155px;
      background: #181d29;
      position: relative;
    }

    .anime-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .anime-title {
      padding: 0.4rem 0.3rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.1;
      color: var(--text-muted);
      height: 42px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .tier-row { flex-direction: column; }
      .tier-label { width: 100%; min-width: 100%; padding: 0.6rem; }
      .anime-card { width: 95px; }
      .anime-img-wrapper { height: 135px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>MI ANIME TIER LIST</h1>
    <div class="controls">
      <input type="text" id="searchBar" placeholder="Buscar por título..." oninput="filterAnimes()">
      <select id="categoryFilter" onchange="filterAnimes()">
        <option value="all">Todas las categorías</option>
        <option value="s">Muy Bueno</option>
        <option value="a">Bueno</option>
        <option value="b">Ni tan bien ni tan mal</option>
        <option value="c">Aburrido</option>
      </select>
    </div>
  </header>

  <main class="tier-container">
    
    <div class="tier-row tier-s" data-tier="s">
      <div class="tier-label">Muy Bueno</div>
      <div class="tier-content" id="list-s"></div>
    </div>

    <div class="tier-row tier-a" data-tier="a">
      <div class="tier-label">Bueno</div>
      <div class="tier-content" id="list-a"></div>
    </div>

    <div class="tier-row tier-b" data-tier="b">
      <div class="tier-label">Ni tan bien<br>ni tan mal</div>
      <div class="tier-content" id="list-b"></div>
    </div>

    <div class="tier-row tier-c" data-tier="c">
      <div class="tier-label">Aburrido</div>
      <div class="tier-content" id="list-c"></div>
    </div>

  </main>

  <script>
    const animeData = [
      // Muy Bueno (s)
      { id: "s1", title: "Tensei shitara slime datta ken season 3", category: "s" },
      { id: "s2", title: "Mairimashita! Iruma-kun season 3", category: "s" },
      { id: "s3", title: "Niwatori Fighter", category: "s" },
      { id: "s4", title: "Wistoria: Wand and Sword", category: "s" },
      { id: "s5", title: "Class de 2-banme ni Kawaii Onnanoko to Tomodachi ni Natta", category: "s" },
      { id: "s6", title: "Akane-banashi", category: "s" },
      { id: "s7", title: "Koori no Jouheki", category: "s" },

      // Bueno (a)
      { id: "a1", title: "Otonari no Tenshi-sama ni Itsunomanika Dame Ningen ni Sareteita Ken", category: "a" },
      { id: "a2", title: "Isekai Nonbiri Nouka", category: "a" },
      { id: "a3", title: "Haibara-kun no Tsuyokute Seishun New Game", category: "a" },
      { id: "a4", title: "Baki Dou", category: "a" },
      { id: "a5", title: "Ponkotsu Fuuki Iin to Skirt-take ga Futekisetsu na JK no Hanashi", category: "a" },
      { id: "a6", title: "Kill Ao", category: "a" },
      { id: "a7", title: "Himekishi wa Barbaroi no Yome", category: "a" },
      { id: "a8", title: "Otaku ni Yasashii Gal wa Inai!?", category: "a" },
      { id: "a9", title: "Tadaima, Ojamasaremasu!", category: "a" },
      { id: "a10", title: "Kanan-sama wa Akumade Choroi", category: "a" },
      { id: "a11", title: "Reincarnation no Kaben", category: "a" },
      { id: "a12", title: "Yozakura-san Chi no Daisakusen", category: "a" },
      { id: "a13", title: "Marriagetoxin", category: "a" },

      // Ni tan bien ni tan mal (b)
      { id: "b1", title: "The Beginning After The End", category: "b" },
      { id: "b2", title: "Higeki no Genkyou to Naru Saikyou Gedou Last Boss Joou wa Tami no Tame ni Tsukushimasu", category: "b" },
      { id: "b3", title: "Nigashita Sakana wa Ookikatta ga Tsuriageta Sakana ga Ookisugita Ken", category: "b" },
      { id: "b4", title: "Aishiteru Game wo Owarasetai", category: "b" },
      { id: "b5", title: "Tongari Boushi no Atelier", category: "b" },
      { id: "b6", title: "Jishou Akuyaku Reijou na Konyakusha no Kansatsu Kiroku", category: "b" },
      { id: "b7", title: "Kujima Utaeba Ie Hororo", category: "b" },
      { id: "b8", title: "Daikenja Riddle no Jikan Gyakkou", category: "b" },
      { id: "b9", title: "Mamonogurai no Boukensha", category: "b" },
      { id: "b10", title: "Ingoku Danchi", category: "b" },
      { id: "b11", title: "Yowayowa Sensei", category: "b" },
      { id: "b12", title: "Kami no Niwatsuki Kusunoki-tei", category: "b" },

      // Aburrido (c)
      { id: "c1", title: "Saikyou no Shokugyou wa Yuusha demo Kenja demo Naku Kanteishi (Kari) Rashii desu yo?", category: "c" },
      { id: "c2", title: "Kirio Fanclub", category: "c" },
      { id: "c3", title: "Hyakki Yakoushou", category: "c" },
      { id: "c4", title: "Ichijouma Mankitsugurashi!", category: "c" },
      { id: "c5", title: "Kamiina Botan, Yoeru Sugata wa Yuri no Hana", category: "c" },
      { id: "c6", title: "Megami 'Isekai Tensei Nani ni Naritai desu ka' Ore 'Yuusha no Rokkotsu de'", category: "c" }
    ];

    const placeholderImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='150' viewBox='0 0 100 150'><rect width='100%' height='100%' fill='%2312151e'/><text x='50%' y='50%' fill='%236c757d' font-size='12' text-anchor='middle'>Anime</text></svg>";

    // Paso 1: Renderizar la UI INMEDIATAMENTE
    function renderInitialUI() {
      animeData.forEach(anime => {
        const container = document.getElementById(`list-${anime.category}`);
        if (!container) return;

        const card = document.createElement('div');
        card.className = 'anime-card';
        card.setAttribute('data-name', anime.title.toLowerCase());

        card.innerHTML = `
          <div class="anime-img-wrapper">
            <img src="${placeholderImg}" alt="${anime.title}" id="img-${anime.id}">
          </div>
          <div class="anime-title" title="${anime.title}">${anime.title}</div>
        `;

        container.appendChild(card);
      });
    }

    // Paso 2: Cargar imágenes una por una de forma segura
    async function loadImagesSequentially() {
      for (const anime of animeData) {
        try {
          const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(anime.title)}&limit=1`);
          if (res.ok) {
            const data = await res.json();
            if (data.data && data.data.length > 0) {
              const imgElem = document.getElementById(`img-${anime.id}`);
              if (imgElem) imgElem.src = data.data[0].images.jpg.image_url;
            }
          }
        } catch (e) {
          console.warn("No se pudo cargar la imagen de:", anime.title);
        }
        // Espera de 800ms para evitar sobrecargar la API
        await new Promise(r => setTimeout(r, 800));
      }
    }

    // Filtro de Búsqueda
    function filterAnimes() {
      const searchValue = document.getElementById('searchBar').value.toLowerCase();
      const selectedCategory = document.getElementById('categoryFilter').value;
      const rows = document.querySelectorAll('.tier-row');

      rows.forEach(row => {
        const rowTier = row.getAttribute('data-tier');
        const cards = row.querySelectorAll('.anime-card');
        let hasVisibleCards = false;

        if (selectedCategory !== 'all' && selectedCategory !== rowTier) {
          row.style.display = 'none';
          return;
        }

        cards.forEach(card => {
          const name = card.getAttribute('data-name');
          const matchesSearch = name.includes(searchValue);

          if (matchesSearch) {
            card.style.display = 'flex';
            hasVisibleCards = true;
          } else {
            card.style.display = 'none';
          }
        });

        row.style.display = hasVisibleCards ? 'flex' : 'none';
      });
    }

    // Ejecutar al cargar la página
    window.addEventListener('DOMContentLoaded', () => {
      renderInitialUI();
      loadImagesSequentially();
    });
  </script>
</body>
</html>
